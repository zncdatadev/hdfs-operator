apiVersion: hdfs.kubedoop.dev/v1alpha1
kind: HdfsCluster
metadata:
  labels:
    app.kubernetes.io/name: hdfscluster
    app.kubernetes.io/instance: hdfscluster-sample
    app.kubernetes.io/managed-by: hdfs-operator
  name: hdfscluster-sample
spec:
  image:
    productVersion: "3.4.1"
    kubedoopVersion: "0.0.0-dev"
  clusterConfig:
    # A ConfigMap that publishes the ZooKeeper connection string under the "ZOOKEEPER" key
    # (required for HDFS HA and the JournalNode quorum).
    zookeeperConfigMapName: hdfscluster-sample-znode
    dfsReplication: 3
  # NameNode: HA metadata servers (Active/Standby).
  nameNodes:
    roleGroups:
      default:
        replicas: 2
        config:
          resources:
            cpu:
              min: "500m"
              max: "2"
            memory:
              limit: "2Gi"
            storage:
              capacity: "2Gi"
          logging:
            containers:
              namenode:
                console:
                  level: INFO
  # JournalNode: shared edit-log quorum (odd replica count).
  journalNodes:
    roleGroups:
      default:
        replicas: 3
        config:
          resources:
            cpu:
              min: "250m"
              max: "1"
            memory:
              limit: "1Gi"
            storage:
              capacity: "1Gi"
  # DataNode: storage workers.
  dataNodes:
    roleGroups:
      default:
        replicas: 3
        config:
          resources:
            cpu:
              min: "500m"
              max: "2"
            memory:
              limit: "2Gi"
            storage:
              capacity: "5Gi"
          logging:
            containers:
              datanode:
                console:
                  level: DEBUG
