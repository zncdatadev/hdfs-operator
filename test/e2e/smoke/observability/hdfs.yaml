apiVersion: hdfs.kubedoop.dev/v1alpha1
kind: HdfsCluster
metadata:
  labels:
    app.kubernetes.io/name: hdfscluster
    app.kubernetes.io/instance: hdfscluster-sample
    app.kubernetes.io/part-of: hdfs-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: hdfs-operator
  name: hdfscluster-sample
  namespace: ($namespace)
spec:
  image:
    productVersion: ($values.product_version)
  clusterConfig:
    zookeeperConfigMapName: sample-hdfs-znode
  nameNodes:
    roleGroups:
      default:
        replicas: 2
        config:
          resources:
            cpu:
              min: "100m"
              max: "200m"
            memory:
              limit: "512Mi"
  journalNodes:
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "100m"
              max: "200m"
            memory:
              limit: "512Mi"
  dataNodes:
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "100m"
              max: "200m"
            memory:
              limit: "512Mi"
